<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COOVALLUNA - Afiliar Asociado</title>
    <link rel="stylesheet" href="../admin/dashboard.css">
    <link rel="preconnect" href="https://googleapis.com">
    <link href="https://googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="layout">

    <!-- Panel Lateral del Asesor (Idéntico y corregido) -->
    <aside class="sidebar" style="background: #0f172a;">
        <div class="logo">
            <h1>COOVALLUNA</h1>
            <p id="nombreAsesor">Asesor Comercial</p>
        </div>
        <nav>
            <a href="index.html" id="lnkInicio">💼 Inicio Operativo</a>
            <a class="active" href="afiliar.html" id="lnkAsociados">👥 Afiliar Asociado</a>
            <a href="abrir-cuenta.html" id="lnkCuentas">🏦 Abrir Cuenta</a>
            <a href="radicar-credito.html" id="lnkCreditos">💳 Radicar Crédito</a>
        </nav>
    </aside>

    <!-- Contenido Principal -->
    <main class="content">
        <header class="header">
            <div>
                <h2>Formulario de Afiliación</h2>
                <p>Ingresa los datos personales del nuevo asociado para el registro en el sistema</p>
            </div>
        </header>

        <!-- Tarjeta del Formulario de Captura -->
        <section class="grid" style="grid-template-columns: 1fr;">
            <div class="table-card" style="padding: 30px; background: white; border-radius: 8px;">
                <form id="formAfiliarAsociado" style="display: flex; flex-direction: column; gap: 20px;">
                    
                    <div style="display: flex; gap: 20px;">
                        <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                            <label style="font-weight: 600; color: #475569;">Número de Cédula:</label>
                            <input type="text" id="cedula_asociado" required style="padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
                        </div>
                        <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                            <label style="font-weight: 600; color: #475569;">Contraseña Inicial:</label>
                            <input type="password" id="contrasena" required style="padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" placeholder="Asignar clave temporal">
                        </div>
                    </div>

                    <div style="display: flex; gap: 20px;">
                        <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                            <label style="font-weight: 600; color: #475569;">Nombres:</label>
                            <input type="text" id="nombres" required style="padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
                        </div>
                        <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                            <label style="font-weight: 600; color: #475569;">Apellidos:</label>
                            <input type="text" id="apellidos" required style="padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
                        </div>
                    </div>

                    <div style="display: flex; gap: 20px;">
                        <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                            <label style="font-weight: 600; color: #475569;">Fecha de Nacimiento:</label>
                            <input type="date" id="fecha_nacimiento" required style="padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
                        </div>
                        <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                            <label style="font-weight: 600; color: #475569;">Municipio:</label>
                            <input type="text" id="municipio" required style="padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" placeholder="Ej: Bugalagrande, Tuluá">
                        </div>
                    </div>

                    <div style="display: flex; gap: 20px;">
                        <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                            <label style="font-weight: 600; color: #475569;">Barrio:</label>
                            <input type="text" id="barrio" style="padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
                        </div>
                        <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                            <label style="font-weight: 600; color: #475569;">Dirección (Calle y Número):</label>
                            <input type="text" id="direccion_completa" required style="padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" placeholder="Ej: Calle 10 # 15-20">
                        </div>
                    </div>

                    <div style="display: flex; gap: 20px; align-items: end;">
                        <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                            <label style="font-weight: 600; color: #475569;">Cuota de Sostenimiento ($):</label>
                            <input type="number" id="cuota_sostenimiento" value="25000" min="0" required style="padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
                        </div>
                        <div style="flex: 1;">
                            <button type="submit" style="width: 100%; background: #22c55e; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 15px;">
                                Guardar Registro de Afiliación
                            </button>
                        </div>
                    </div>

                </form>
            </div>
        </section>
    </main>
</div><script>
    // Personalización del nombre del asesor
    document.addEventListener('DOMContentLoaded', () => {
        const nombre = sessionStorage.getItem('coovalluna_nombre') || 'Asesor Comercial';
        document.getElementById('nombreAsesor').textContent = nombre;
    });

    document.getElementById('formAfiliarAsociado').addEventListener('submit', async (e) => {
        e.preventDefault();

        const direccion = document.getElementById('direccion_completa').value;
        let calleInput = 'Calle';
        let numeroInput = '0-0';

        // Separación segura de dirección
        if (direccion.includes('#')) {
            const partes = direccion.split('#').map(str => str.trim());
            calleInput = partes[0] || 'Calle';
            numeroInput = partes[1] || '0-0';
        } else {
            calleInput = direccion || 'Calle';
        }

        // FECHA DE HOY SEGURA: Formato manual YYYY-MM-DD para evitar fallos de métodos ISO
        const hoy = new Date();
        const anio = hoy.getFullYear();
        const mes = String(hoy.getMonth() + 1).padStart(2, '0');
        const dia = String(hoy.getDate()).padStart(2, '0');
        const fechaFormateada = `${anio}-${mes}-${dia}`;

        const nuevoAsociado = {
            cedula_asociado: document.getElementById('cedula_asociado').value.trim(),
            nombres: document.getElementById('nombres').value.trim(),
            apellidos: document.getElementById('apellidos').value.trim(),
            contrasena: document.getElementById('contrasena').value.trim(),
            fecha_nacimiento: document.getElementById('fecha_nacimiento').value,
            barrio: document.getElementById('barrio').value.trim() || 'Centro',
            calle: calleInput,
            numero: numeroInput,
            municipio: document.getElementById('municipio').value.trim(),
            fecha_afiliacion: fechaFormateada, // TEXTO PLANO SEGURO YYYY-MM-DD
            estado: 'ACTIVO',
            cuota_sostenimiento: parseFloat(document.getElementById('cuota_sostenimiento').value) || 25000
        };

        try {
            const res = await fetch('http://localhost:3000/api/asociados', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(nuevoAsociado)
            });

            const respuestaServidor = await res.json();

            if (res.ok || res.status === 201) {
                alert('¡Asociado afiliado con éxito en el sistema!');
                document.getElementById('formAfiliarAsociado').reset();
                window.location.href = 'index.html'; 
            } else {
                alert('Error en la base de datos: ' + (respuestaServidor.error || respuestaServidor.detalle || 'Restricción de DDL rota.'));
            }
        } catch (error) {
            console.error('Error detallado de red:', error);
            alert('Error al enviar la petición. Revisa que tu backend siga encendido en la terminal.');
        }
    });
</script>

</body>
</html>
